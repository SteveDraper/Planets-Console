# Default amalgamated config. Override with -c/--config (e.g. -c server.port=9000).
server:
  host: "127.0.0.1"
  port: 8000

api:
  storage_backend: file
  storage_root: ./.data
  storage_asset_path: null   # ephemeral only; ignored for file backend
  include_dummy_data: false   # seed sample paths if missing (set false for production)

bff:
  cors_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
  # Optional: auto-load this stored game id without login (pair with api.include_dummy_data for sample 628580).
  # show_initial_game: "628580"
