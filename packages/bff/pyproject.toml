[project]
name = "bff"
version = "0.1.0"
description = "Backend-for-Frontend layer"
requires-python = ">=3.14"
dependencies = [
    "api",
    "fastapi>=0.115.0",
]

[tool.uv.sources]
api = { workspace = true }

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [".", "../api"]
