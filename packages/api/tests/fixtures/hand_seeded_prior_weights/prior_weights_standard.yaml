# Inference build prior for the "standard" game category (hand-seeded pseudo-counts).
# TEST-ONLY fixture: copied from the original production hand-seed for unit tests.
# Production assets live under assets/analytics/scores/ and are populated by the prior miner.
# Counts are un-normalized; Core converts each table to log-probability integer weights
# at catalog build (Laplace smoothing, alpha=1). See design-military-score-inference-build-priors.md.
#
# Wildcard: key '*' is the default pseudo-count for any id not listed explicitly in that table.
# Illegal in histogram and slotFill tables. Expanded to the catalog candidate set at resolve time.
#
# Aggregate histograms carry an occurrence prior in a leading none bin (count == 0). The `0:`
# key holds the none-bin pseudo-count; it was computed via none_bin_pseudo_count() so the gap to
# the most likely active bin reproduces the legacy parsimony penalty (LEGACY_PARSIMONY_OCCURRENCE_PENALTY).
# There is no separate `counts` shape: every aggregate, including fighter transfers, is a histogram.

version: 3
category: standard  # must match filename stem prior_weights_{category}.yaml
gameCategoryRulesVersion: 2  # bump when GameCategory.from_game_settings() rules change

hulls:
  # Inference ship-limit band: tables split on whether the player is before/after ship limit.
  before_ship_limit:
    global:
      "*": 50  # default pseudo-count for any other buildable hull id
      15: 220  # Small Deep Space Freighter; collapsed into the solver generic freighter combo
      24: 450  # Serpent Class Escort
      71: 140  # Swift Wind Class Carrier
      44: 90  # Br4 Class Gunship
      27: 60  # Swift Heart Class Scout
    byRace:
      2:  # The Lizard Alliance
        24: 620  # Serpent Class Escort
  after_ship_limit:
    global:
      "*": 40
      15: 180  # Small Deep Space Freighter; collapsed into the solver generic freighter combo
      24: 320  # Serpent Class Escort
      71: 200  # Swift Wind Class Carrier
      44: 70  # Br4 Class Gunship
      27: 50  # Swift Heart Class Scout

components:
  # Component conditional priors keyed by inference hull category (race-agnostic in v1).
  before_ship_limit:
    beam_ship:  # resolve_inference_hull_category() label
      engines:
        "*": 25
        1: 320  # StarDrive 1
        5: 40  # StarDrive 5
      beams:
        "*": 10
        1: 280  # Laser
        3: 35  # Plasma Bolt
      slotFill:
        full: 240  # all hull weapon slots filled
        partial: 15
    carrier:
      engines:
        "*": 15
        1: 200  # StarDrive 1
        7: 25  # StarDrive 7
      slotFill:
        full: 180
        partial: 20
    torpedo_ship:
      engines:
        "*": 20
        1: 260  # StarDrive 1
        5: 45  # StarDrive 5
      torpedoes:
        "*": 12
        1: 300  # Mark 1 Photon
        8: 25  # Mark 8 Phase
      slotFill:
        full: 220
        partial: 12
  after_ship_limit:
    beam_ship:
      engines:
        "*": 20
        1: 250  # StarDrive 1
        5: 35  # StarDrive 5
      beams:
        "*": 8
        1: 220  # Laser
      slotFill:
        full: 200
        partial: 18
    carrier:
      engines:
        "*": 12
        1: 170  # StarDrive 1
      slotFill:
        full: 160
        partial: 22
    torpedo_ship:
      engines:
        "*": 15
        1: 210  # StarDrive 1
      torpedoes:
        "*": 10
        1: 260  # Mark 1 Photon
      slotFill:
        full: 190
        partial: 14

