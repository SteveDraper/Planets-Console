[project]
name = "api"
version = "0.1.0"
description = "Core REST API layer"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.115.0",
    "dacite>=1.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
