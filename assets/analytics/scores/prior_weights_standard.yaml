# Inference build prior for the "standard" game category (hand-seeded v1 pseudo-counts).
# Counts are un-normalized; Core converts each table to log-probability integer weights
# at catalog build (Laplace smoothing, alpha=1). See design-military-score-inference-build-priors.md.
#
# Wildcard: key '*' is the default pseudo-count for any id not listed explicitly in that table.
# Illegal in histogram and slotFill tables. Expanded to the catalog candidate set at resolve time.

version: 2
category: standard  # must match filename stem prior_weights_{category}.yaml
gameCategoryRulesVersion: 1  # bump when resolve_inference_game_category() rules change

hulls:
  # Inference ship-limit band: tables split on whether the player is before/after ship limit.
  before_ship_limit:
    global:
      "*": 50  # default pseudo-count for any other buildable hull id
      15: 220  # Small Deep Space Freighter
      24: 450  # Serpent Class Escort
      71: 140  # Swift Wind Class Carrier
      44: 90  # Br4 Class Gunship
      27: 60  # Swift Heart Class Scout
    byRace:
      2:  # The Lizard Alliance
        24: 620  # Serpent Class Escort
  after_ship_limit:
    global:
      "*": 40
      15: 180  # Small Deep Space Freighter
      24: 320  # Serpent Class Escort
      71: 200  # Swift Wind Class Carrier
      44: 70  # Br4 Class Gunship
      27: 50  # Swift Heart Class Scout

components:
  # Component conditional priors keyed by inference hull category (race-agnostic in v1).
  before_ship_limit:
    beam_ship:  # resolve_inference_hull_category() label
      engines:
        "*": 25
        1: 320  # StarDrive 1
        5: 40  # StarDrive 5
      beams:
        "*": 10
        1: 280  # Laser
        3: 35  # Plasma Bolt
      slotFill:
        full: 240  # all hull weapon slots filled
        partial: 15
    carrier:
      engines:
        "*": 15
        1: 200  # StarDrive 1
        7: 25  # StarDrive 7
      slotFill:
        full: 180
        partial: 20
    torpedo_ship:
      engines:
        "*": 20
        1: 260  # StarDrive 1
        5: 45  # StarDrive 5
      torpedoes:
        "*": 12
        1: 300  # Mark 1 Photon
        8: 25  # Mark 8 Phase
      slotFill:
        full: 220
        partial: 12
  after_ship_limit:
    beam_ship:
      engines:
        "*": 20
        1: 250  # StarDrive 1
        5: 35  # StarDrive 5
      beams:
        "*": 8
        1: 220  # Laser
      slotFill:
        full: 200
        partial: 18
    carrier:
      engines:
        "*": 12
        1: 170  # StarDrive 1
      slotFill:
        full: 160
        partial: 22
    torpedo_ship:
      engines:
        "*": 15
        1: 210  # StarDrive 1
      torpedoes:
        "*": 10
        1: 260  # Mark 1 Photon
      slotFill:
        full: 190
        partial: 14

aggregates:
  before_ship_limit:
    planet_defense_posts_added_total:
      histogram:
        5: 120  # magnitude (discrete total) -> pseudo-count; rolled into solver buckets at load
        15: 80
        40: 20
        90: 5
    starbase_defense_posts_added_total:
      histogram:
        5: 100
        15: 70
        40: 18
        90: 4
    starbase_fighters_added_total:
      histogram:
        10: 90
        30: 60
        80: 15
        150: 4
    ship_fighters_added_total:
      histogram:
        10: 85
        30: 55
        80: 12
        200: 3
    fighters_starbase_to_ship:
      counts:
        default: 65  # non-bucketed action pseudo-count -> action probability_weight
    fighters_ship_to_starbase:
      counts:
        default: 35
    ship_torps_loaded_1:
      histogram:
        10: 80  # Mark 1 Photon load magnitudes
        50: 45
        120: 8
  after_ship_limit:
    planet_defense_posts_added_total:
      histogram:
        5: 90
        15: 65
        40: 16
        90: 3
    starbase_defense_posts_added_total:
      histogram:
        5: 85
        15: 60
        40: 14
        90: 3
    starbase_fighters_added_total:
      histogram:
        10: 75
        30: 50
        80: 12
        150: 3
    ship_fighters_added_total:
      histogram:
        10: 70
        30: 48
        80: 10
        200: 2
    fighters_starbase_to_ship:
      counts:
        default: 55
    fighters_ship_to_starbase:
      counts:
        default: 30

overrides:
  combos: {}  # combo_id -> pseudo-count (optional sparse corrections; no wildcard)
  hulls:
    999999: 220  # GENERIC_FREIGHTER_PRIOR_HULL_ID -- freighter combo marginal (not a buildable hull)
