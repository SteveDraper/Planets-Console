# Inference build prior for the "epic" game category (mined pseudo-counts).
# Counts are un-normalized; Core converts each table to log-probability integer weights
# at catalog build (Laplace smoothing, alpha=1). See design-military-score-inference-build-priors.md.
#
# Wildcard: key '*' is the default pseudo-count for any id not listed explicitly in that table.
# Illegal in histogram and slotFill tables. Expanded to the catalog candidate set at resolve time.
#
# Aggregate histograms carry an occurrence prior in a leading none bin (count == 0). The `0:`
# key holds the none-bin pseudo-count; it was computed via none_bin_pseudo_count() so the gap to
# the most likely active bin reproduces the legacy parsimony penalty (LEGACY_PARSIMONY_OCCURRENCE_PENALTY).
# There is no separate `counts` shape: every aggregate, including fighter transfers, is a histogram.
#
# The prior miner substitutes epic and fills counts when writing a new category asset.

