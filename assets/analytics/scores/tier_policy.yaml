# Inference search tier ladder (sketch A, section 8.5.3).
# filters.*.all widens eligibility (see tier_policy.py module docstring).
# filters.*.techLevels narrows by component techlevel; ids derived at runtime.
# filters.*.raiseMaxTechFromPriorFleet (#227): raise techLevels ceiling from
# prior-turn fleet max tech when that overlay is applied; omit the step when
# every flagged axis already saturates the turn catalog. Distinct from #226
# hullCollisionTwinWiden (score twins without fleet proof) and from
# allowShipOnlyExactEarlyStop (ladder stop after a ship-only exact).
#
# Fleet-informed torp admission + ranking (#87, section 8.8): early torp tiers use
# belief-set ids only; inference torp escape tier (penultimate step, alpha > 0) admits
# all eligible torp types.
#
# Order: ship bands first, then high-prior aggregates (belief torps, modest planet
# defense), then full-catalog ship polish (capped), then heavier aggregates / escape.
# Per-step minSeconds / maxSeconds: reserved soft-global envelopes (see design §8.5.3).
fleetInferenceTuning:
  torpMisalignmentLogPenalty: 200
  optionSetMassThreshold: 0.25
  # componentTechGapLogPenaltyPerLevel: <int>   # #156
version: 1

# Solver magnitude bins for aggregate-action ranking (not per tier step).
# Keys match aggregate action ids or allowlist keys (ship_torps_per_type, etc.).
aggregateProbabilityBins:
  planet_defense_posts_added_total:
    - label: no build-up
      lowerCount: 0
      upperCount: 0
    - label: modest build-up
      lowerCount: 1
      upperCount: 16
    - label: heavy build-up
      lowerCount: 17
      upperCount: 30
    - label: very heavy build-up
      lowerCount: 31
      upperCount: 79
    - label: extreme build-up
      lowerCount: 80
      upperCount: 200
  starbase_defense_posts_added_total:
    - label: no build-up
      lowerCount: 0
      upperCount: 0
    - label: modest build-up
      lowerCount: 1
      upperCount: 20
    - label: heavy build-up
      lowerCount: 21
      upperCount: 100
    - label: extreme build-up
      lowerCount: 101
      upperCount: 400
  starbase_fighters_added_total:
    - label: no build-up
      lowerCount: 0
      upperCount: 0
    - label: modest build-up
      lowerCount: 1
      upperCount: 20
    - label: heavy build-up
      lowerCount: 21
      upperCount: 100
    - label: extreme build-up
      lowerCount: 101
      upperCount: 200
  ship_fighters_added_total:
    - label: no build-up
      lowerCount: 0
      upperCount: 0
    - label: modest load
      lowerCount: 1
      upperCount: 20
    - label: heavy load
      lowerCount: 21
      upperCount: 100
    - label: extreme load
      lowerCount: 101
      upperCount: 500
  ship_torps_per_type:
    - label: no build-up
      lowerCount: 0
      upperCount: 0
    - label: modest load
      lowerCount: 1
      upperCount: 40
    - label: heavy load
      lowerCount: 41
      upperCount: 100
    - label: extreme load
      lowerCount: 101
      upperCount: 200
  fighter_transfers_per_direction:
    - label: no build-up
      lowerCount: 0
      upperCount: 0
    - label: transferred
      lowerCount: 1
      upperCount: 50

solverThresholds:
  shipOnlyExactEarlyStopMinPlausibility: -300
  # Same floor as ship-only exact early-stop: a no-op tier may halt the ladder only
  # when the best held exact already meets this plausibility (#236).
  noNewExactSignaturesEarlyStopMinPlausibility: -300

# nearBestObjectiveThreshold (per step): after first maximize Z*, further
# structural solves only accept ranking obj in [Z*-T, sliding max].
# T=250 covers ~122 gap for lizard t9 truth vs early ship-only Z* (~-378 vs -500).
steps:
  - id: early_game_bands
    filters:
      hulls:
        techLevels: [1, 2, 3, 4, 5, 6]
        raiseMaxTechFromPriorFleet: true
      engines:
        all: true
      beams:
        techLevels: [1, 2, 3, 4, 5]
        raiseMaxTechFromPriorFleet: true
      launchers:
        techLevels: [1, 2, 3, 4, 5]
        raiseMaxTechFromPriorFleet: true
    beamSlotCounts: none
    launcherSlotCounts: none
    aggregateAllowlist: {}
    alpha: 50
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: false
    minSeconds: 0
    maxSeconds: 8

  - id: widen_launchers
    filters:
      hulls:
        techLevels: [1, 2, 3, 4, 5, 6]
        raiseMaxTechFromPriorFleet: true
      engines:
        all: true
      beams:
        techLevels: [1, 2, 3, 4, 5]
        raiseMaxTechFromPriorFleet: true
      launchers:
        techLevels: [1, 2, 3, 4, 5, 6, 7, 8]
        raiseMaxTechFromPriorFleet: true
    beamSlotCounts: none
    launcherSlotCounts: none
    aggregateAllowlist: {}
    alpha: 50
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: false
    minSeconds: 0
    maxSeconds: 8

  # After widen_launchers so twin combos that need launcher tech >5 (e.g. Gamma on
  # Resolute) are expressible. Hull admission is runtime-conditional via twin asset
  # includeComponentIds overlay (#226); static hull band stays tech 1--6, raised from
  # prior fleet when raiseMaxTechFromPriorFleet applies (#227).
  - id: collision_hull_widen
    filters:
      hulls:
        techLevels: [1, 2, 3, 4, 5, 6]
        raiseMaxTechFromPriorFleet: true
      engines:
        all: true
      beams:
        techLevels: [1, 2, 3, 4, 5]
        raiseMaxTechFromPriorFleet: true
      launchers:
        techLevels: [1, 2, 3, 4, 5, 6, 7, 8]
        raiseMaxTechFromPriorFleet: true
    beamSlotCounts: none
    launcherSlotCounts: none
    aggregateAllowlist: {}
    alpha: 50
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: false
    hullCollisionTwinWiden: true
    minSeconds: 0
    maxSeconds: 5

  - id: widen_hulls
    filters:
      hulls:
        all: true
      engines:
        all: true
      beams:
        techLevels: [1, 2, 3, 4, 5]
        raiseMaxTechFromPriorFleet: true
      launchers:
        techLevels: [1, 2, 3, 4, 5, 6, 7, 8]
        raiseMaxTechFromPriorFleet: true
    beamSlotCounts: none
    launcherSlotCounts: none
    aggregateAllowlist: {}
    alpha: 50
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: false
    minSeconds: 0
    maxSeconds: 8

  # High-prior belief torps before full-catalog ship polish. Open full beam/launcher
  # eligibility (``all``) so activetorps / activebeams intersection applies.
  - id: admit_ship_torpedoes
    filters:
      hulls:
        all: true
      engines:
        all: true
      beams:
        all: true
      launchers:
        all: true
    beamSlotCounts: partial
    launcherSlotCounts: partial
    aggregateAllowlist:
      ship_torps_per_type: 40
    alpha: 30
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: false
    minSeconds: 3
    maxSeconds: 8

  - id: modest_planet_defense
    filters:
      hulls:
        all: true
      engines:
        all: true
      beams:
        all: true
      launchers:
        all: true
    beamSlotCounts: partial
    launcherSlotCounts: partial
    aggregateAllowlist:
      ship_torps_per_type: 40
      planet_defense_posts_added_total: 16
    alpha: 50
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: false
    minSeconds: 1
    maxSeconds: 5

  # Full-catalog ship polish retread; retain prior aggregates (monotonic allowlist).
  - id: full_components
    filters:
      hulls:
        all: true
      engines:
        all: true
      beams:
        all: true
      launchers:
        all: true
    beamSlotCounts: partial
    launcherSlotCounts: partial
    aggregateAllowlist:
      ship_torps_per_type: 40
      planet_defense_posts_added_total: 16
    alpha: 50
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: true
    minSeconds: 0
    maxSeconds: 5

  - id: admit_starbase_defense_posts
    filters:
      hulls:
        all: true
      engines:
        all: true
      beams:
        all: true
      launchers:
        all: true
    beamSlotCounts: partial
    launcherSlotCounts: partial
    aggregateAllowlist:
      ship_torps_per_type: 40
      planet_defense_posts_added_total: 16
      starbase_defense_posts_added_total: 5
      starbase_fighters_added_total: 50
      ship_fighters_added_total: 20
      fighter_transfers_per_direction: 50
    alpha: 30
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: true
    minSeconds: 0
    maxSeconds: 8

  - id: torp_escape_tier
    filters:
      hulls:
        all: true
      engines:
        all: true
      beams:
        all: true
      launchers:
        all: true
    beamSlotCounts: partial
    launcherSlotCounts: partial
    aggregateAllowlist:
      ship_torps_per_type: 40
      planet_defense_posts_added_total: 16
      starbase_defense_posts_added_total: 5
      starbase_fighters_added_total: 50
      ship_fighters_added_total: 20
      fighter_transfers_per_direction: 50
    alpha: 30
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: true
    minSeconds: 0
    maxSeconds: 8

  - id: full_catalog_exact
    filters:
      hulls:
        all: true
      engines:
        all: true
      beams:
        all: true
      launchers:
        all: true
    beamSlotCounts: partial
    launcherSlotCounts: partial
    aggregateAllowlist:
      planet_defense_posts_added_total: 100
      starbase_defense_posts_added_total: 100
      ship_torps_per_type: 200
      starbase_fighters_added_total: 200
      ship_fighters_added_total: 500
      fighter_transfers_per_direction: 100
    alpha: 0
    maxSeeds: 5
    nearBestObjectiveThreshold: 250
    allowShipOnlyExactEarlyStop: true
    minSeconds: 0
    maxSeconds: 8
